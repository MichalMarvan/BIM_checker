<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIM Checker - Test Runner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2em;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .stat-card.passed {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }

        .stat-card.failed {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
            color: white;
        }

        .stat-card.total {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }

        .stat-card.time {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            color: white;
        }

        .stat-value {
            font-size: 2.5em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
        }

        .test-results {
            margin-top: 20px;
        }

        .test-suite {
            margin-bottom: 20px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            overflow: hidden;
        }

        .suite-header {
            background: #f8f9fa;
            padding: 15px 20px;
            font-weight: 600;
            font-size: 1.1em;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
        }

        .suite-header:hover {
            background: #e9ecef;
        }

        .suite-stats {
            font-size: 0.9em;
            color: #666;
        }

        .suite-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        .suite-content.expanded {
            max-height: 2000px;
        }

        .test-case {
            padding: 15px 20px;
            border-top: 1px solid #e0e0e0;
            display: flex;
            align-items: flex-start;
            gap: 15px;
        }

        .test-icon {
            font-size: 1.5em;
            flex-shrink: 0;
        }

        .test-info {
            flex: 1;
        }

        .test-name {
            font-weight: 600;
            margin-bottom: 5px;
            color: #333;
        }

        .test-duration {
            font-size: 0.85em;
            color: #666;
        }

        .test-error {
            margin-top: 10px;
            padding: 10px;
            background: #fff3cd;
            border-left: 3px solid #ffc107;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            color: #856404;
            white-space: pre-wrap;
        }

        .test-case.passed {
            background: #f0fdf4;
        }

        .test-case.failed {
            background: #fef2f2;
        }

        .test-case.passed .test-icon {
            color: #22c55e;
        }

        .test-case.failed .test-icon {
            color: #ef4444;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #e0e0e0;
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 30px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s ease;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .filter-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .filter-btn {
            padding: 8px 16px;
            font-size: 14px;
            border: 2px solid #e0e0e0;
            background: white;
            color: #666;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .filter-btn.active {
            border-color: #667eea;
            background: #667eea;
            color: white;
        }

        .filter-btn:hover {
            border-color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 BIM Checker Test Runner</h1>
        <p class="subtitle">Kompletní testovací sada pro všechny moduly</p>

        <div class="controls">
            <button class="btn-primary" onclick="runAllTests()">▶️ Spustit všechny testy</button>
            <button class="btn-secondary" onclick="clearResults()">🗑️ Vymazat výsledky</button>
            <button class="btn-secondary" onclick="exportResults()">📥 Export JSON</button>
        </div>

        <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="stats" id="stats">
            <div class="stat-card total">
                <div class="stat-value" id="totalTests">0</div>
                <div class="stat-label">Celkem testů</div>
            </div>
            <div class="stat-card passed">
                <div class="stat-value" id="passedTests">0</div>
                <div class="stat-label">Úspěšných</div>
            </div>
            <div class="stat-card failed">
                <div class="stat-value" id="failedTests">0</div>
                <div class="stat-label">Neúspěšných</div>
            </div>
            <div class="stat-card time">
                <div class="stat-value" id="totalTime">0ms</div>
                <div class="stat-label">Celkový čas</div>
            </div>
        </div>

        <div class="filter-buttons">
            <button class="filter-btn active" data-filter="all" onclick="filterTests('all')">Všechny</button>
            <button class="filter-btn" data-filter="passed" onclick="filterTests('passed')">✓ Úspěšné</button>
            <button class="filter-btn" data-filter="failed" onclick="filterTests('failed')">✗ Neúspěšné</button>
        </div>

        <div class="test-results" id="testResults">
            <div class="loading">
                <div>Klikněte na "Spustit všechny testy" pro zahájení testování</div>
            </div>
        </div>
    </div>

    <!-- Stubs for viewer-init.js DOM elements and globals needed for unit testing -->
    <script>
    (function() {
        // Create hidden stub elements for all IDs referenced at top level of viewer-init.js
        var ids = [
            'uploadArea','fileInput','columnManagerBtn','columnManager','applyColumnsBtn',
            'selectAllBtn','deselectAllColumnsBtn','searchInput','entityFilter','fileFilter',
            'clearFiltersBtn','exportBtn','firstPageBtn','prevPageBtn','nextPageBtn',
            'lastPageBtn','goToPageBtn','pageInput','pageSizeSelect','pageSizeSelectTop',
            'toggleEditModeBtn','editPanel','selectAllVisibleBtn','selectAllPagesBtn',
            'deselectAllBtn','bulkEditBtn','bulkEditCount','bulkEditModal','bulkPsetName',
            'bulkPropName','bulkValue','addPsetBtn','addPsetCount','addPsetModal',
            'newPsetName','newPropertyName','newPropName','newPropValue','currentValuesList',
            'currentValuesSection','renamePsetBtn','renamePsetCount','renamePsetModal',
            'oldPsetName','newPsetNameRename','renamePropertyBtn','renamePropertyCount',
            'renamePropertyModal','renamePropPsetName','oldPropertyName','newPropName',
            'exportIfcBtn','loadFromStorageBtn','storagePickerModal','storageFileTree',
            'selectedFilesCount','tableContainer','loading','spatialTreePanel',
            'spatialTreeContent','spatialTreeOverlay','toggleSpatialTreeBtn','closeSpatialTreeBtn'
        ];
        ids.forEach(function(id) {
            if (!document.getElementById(id)) {
                var el = document.createElement('div');
                el.id = id;
                el.style.display = 'none';
                document.body.appendChild(el);
            }
        });
        // Replace div stubs with select elements where needed
        ['pageSizeSelect','pageSizeSelectTop','entityFilter','fileFilter','bulkPsetName',
         'bulkPropName','renamePropPsetName'].forEach(function(id) {
            var el = document.getElementById(id);
            if (el && el.tagName !== 'SELECT') {
                var sel = document.createElement('select');
                sel.id = id;
                sel.style.display = 'none';
                el.parentNode.replaceChild(sel, el);
            }
        });
        // Stub ViewerState for viewer-init.js top-level access
        window.ViewerState = {
            allData: [], filteredData: [], loadedFiles: [], modifications: {},
            editMode: false, selectedEntities: new Set(), psetOrder: [],
            propertySetGroups: {}, visiblePsets: {}, searchTerm: '',
            entityFilterValue: '', fileFilterValue: '', sortColumn: null,
            currentPage: 1, totalPages: 1, pageSize: 50
        };
        // Stub all viewer-core.js functions used by viewer-init.js
        window.initIFCCache = function() { return Promise.resolve(); };
        window.getIFCContent = function() { return Promise.resolve(null); };
        window.storeIFCContent = function() { return Promise.resolve(); };
        window.escapeHtml = function(s) { return String(s); };
        window.handleFiles = function() {};
        // Stub ErrorHandler
        window.ErrorHandler = {
            error: function() {}, warning: function() {}, success: function() {}, info: function() {}
        };
    })();
    </script>
